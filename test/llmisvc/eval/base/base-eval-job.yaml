# This Kubernetes Job runs the lm-evaluation-harness tool.
# It's designed to be self-contained, installing its own dependencies
# using the 'uv' package manager before executing the evaluation.
apiVersion: batch/v1
kind: Job
metadata:
  name: lm-eval
spec:
  activeDeadlineSeconds: 3600
  backoffLimit: 1
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: lm-eval
      containers:
        - name: lm-eval-container
          image: ghcr.io/astral-sh/uv:0.8-python3.12-bookworm
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: MODEL
              value: "TBD"
            - name: BASE_URL
              value: "TBD"
            - name: TASKS
              value: "gsm8k"
            - name: NUM_CONCURRENT
              value: "100"
            # Set a writable cache directory for uv to avoid permission errors.
            # The default user in this container does not have write access to the root filesystem.
            - name: UV_CACHE_DIR
              value: "/tmp/uv-cache"
            # Set a writable platform directory for uv to avoid permission errors.
            - name: UV_PLATFORM_DIR
              value: "/tmp/uv-platform"
            # Set the HOME directory to a writable location to avoid permission errors.
            - name: HOME
              value: "/tmp"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TERM
              value: "dumb"
          command: ["/bin/sh", "-c"]
          # The script to be executed. The '|' allows for a multi-line string.
          args:
            - |
              export OPENAI_API_KEY=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              echo "OPENAI_API_KEY length: $(echo -n "${OPENAI_API_KEY}" | wc -c)"

              attempt=0
              echo "--- Waiting for model endpoint to be ready ---"
              until curl -sf -o /dev/null -H "Authorization: Bearer ${OPENAI_API_KEY}" "${BASE_URL}/v1/models"; do
                attempt=$((attempt + 1))
                if [ "${attempt}" -ge 60 ]; then
                  echo "Timed out waiting for model endpoint after ${attempt} attempts"
                  exit 1
                fi
                echo "Model endpoint not ready, retrying in 10s..."
                sleep 10
              done
              echo "--- Model endpoint is ready ---"

              mkdir /tmp/lm-eval && cd /tmp/lm-eval
              set -e
              set -x

              echo "--- Starting lm_eval setup ---"
              
              # Create a virtual environment in the current directory named '.venv'.
              echo "Creating Python virtual environment..."
              uv venv
              echo "Virtual environment created."
              # Activate the virtual environment.
              . .venv/bin/activate
              
              # Install the lm-evaluation-harness library with API support.
              echo "Installing lm_eval library..."
              uv pip install "lm_eval[api]==0.4.11" "transformers==4.57.6" "torch==2.7.1+cpu" --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple/ --index-strategy unsafe-best-match
              echo "lm_eval installation complete."
              
              echo "--- Setup complete. Starting evaluation ---"
              echo "Model for evaluation: ${MODEL}"
              echo "Target URL: ${BASE_URL}"
              
              set +e
              (while true; do echo "[heartbeat $(date +%H:%M:%S)] lm_eval still running"; sleep 30; done) &
              HEARTBEAT_PID=$!

              lm_eval --model local-chat-completions --tasks "${TASKS}" \
                --model_args model=${MODEL},base_url=${BASE_URL}/v1/chat/completions,num_concurrent=${NUM_CONCURRENT},max_retries=3,tokenized_requests=False \
                --verbosity DEBUG 2>&1
              EXIT_CODE=$?

              kill $HEARTBEAT_PID 2>/dev/null
              echo "--- lm_eval exited with code: ${EXIT_CODE} ---"
              exit "${EXIT_CODE}"
          resources:
            requests:
              cpu: "2"
              memory: "512Mi"
      # The restart policy for the Pod. 'Never' is suitable for one-off tasks.
      # 'OnFailure' could also be used if you want the Pod to retry on its own.
      restartPolicy: Never
