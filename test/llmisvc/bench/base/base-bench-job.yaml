apiVersion: batch/v1
kind: Job
metadata:
  name: guidellm
spec:
  activeDeadlineSeconds: 3600
  backoffLimit: 1
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: guidellm
      containers:
        - name: guidellm
          image: ghcr.io/vllm-project/guidellm:v0.7.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: MODEL
              value: "TBD"
            - name: BASE_URL
              value: "TBD"
            - name: PROFILE
              value: "sweep"
            - name: MAX_SECONDS
              value: "300"
            - name: DATA
              value: "prompt_tokens=256,output_tokens=128"
            - name: HOME
              value: "/home/guidellm"
          command: ["/bin/sh", "-c"]
          args:
            - |
              export OPENAI_API_KEY=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)

              attempt=0
              echo "--- Waiting for model endpoint to be ready ---"
              until curl -sf -o /dev/null -H "Authorization: Bearer ${OPENAI_API_KEY}" "${BASE_URL}/v1/models"; do
                attempt=$((attempt + 1))
                if [ "${attempt}" -ge 60 ]; then
                  echo "Timed out waiting for model endpoint after ${attempt} attempts"
                  exit 1
                fi
                echo "Model endpoint not ready, retrying in 10s..."
                sleep 10
              done
              echo "--- Model endpoint is ready ---"

              set -e
              echo "Model: ${MODEL}"
              echo "Target: ${BASE_URL}"
              echo "Profile: ${PROFILE}"

              guidellm run \
                --backend "kind=openai_http,target=${BASE_URL}/v1,model=${MODEL},api_key=${OPENAI_API_KEY}" \
                --profile "kind=${PROFILE}" \
                --constraint "kind=max_duration,seconds=${MAX_SECONDS}" \
                --data "kind=synthetic_text,${DATA}"

              echo "--- guidellm benchmark finished ---"
          resources:
            requests:
              cpu: "2"
              memory: "512Mi"
      restartPolicy: Never