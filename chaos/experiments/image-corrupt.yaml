apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: kserve-image-corrupt
  namespace: redhat-ods-applications
spec:
  tier: 3
  target:
    operator: kserve
    component: kserve
    resource: Deployment/kserve-controller-manager
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: kserve-controller-manager
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "60s"
  injection:
    type: ImageCorrupt
    dangerLevel: high
    parameters:
      name: kserve-controller-manager
    ttl: "300s"
  hypothesis:
    description: >-
      Patching the container image to an invalid registry causes
      ImagePullBackOff. Tests whether the operator detects the stuck
      rollout and takes corrective action.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 2
    allowDangerous: true
    allowedNamespaces:
      - redhat-ods-applications
