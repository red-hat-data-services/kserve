apiVersion: v1
kind: ServiceAccount
metadata:
  name: lm-eval
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lm-eval
rules:
  - apiGroups: [ "serving.kserve.io" ]
    resources: [ "llminferenceservices" ]
    verbs: [ "get" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lm-eval
subjects:
  - kind: ServiceAccount
    name: lm-eval
roleRef:
  kind: Role
  name: lm-eval
  apiGroup: rbac.authorization.k8s.io
